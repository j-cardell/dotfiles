general {
    hide_cursor = true
}

background {
    monitor =
    color = rgb(0, 0, 0)
    blur_passes = 0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    outer_color = rgb(100, 100, 100)
    inner_color = rgb(30, 30, 30)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = "Enter Password"
    hide_input = true
    check_color = rgb(0, 255, 0)
    fail_color = rgb(255, 0, 0)
    fail_text = "Incorrect Password!"
    position = 0, 0
    halign = center
    valign = center
    animation = inputFieldFade, 2000, 0.2, 1.0  # Fade input field when empty
}

label {
    monitor =
    text = cmd[update:1000] date "+%a %b %d %I:%M %p"  # 12-hour format: e.g., Tue Oct 21 5:46 PM
    color = rgb(200, 200, 200)
    font_size = 20
    position = 0, 50
    halign = center
    valign = center
    animation = fade, 5000, 0.2, 1.0  # Fade in/out over 5s (20% to 100% opacity)
    animation = slide, 10000, 800, 800, 800, 800  # Move in 800x800px box over 10s
}
