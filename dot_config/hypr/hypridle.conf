general {
    ignore_dbus_inhibit = false  # Respect inhibitors (e.g., Quickshell, video players)
    lock_cmd = pidof hyprlock || hyprlock  # Run hyprlock for locking
    before_sleep_cmd = loginctl lock-session  # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Wake monitors after resume
}

listener {
    timeout = 270  # 30 seconds before lock
    on-timeout = notify-send "Locking in 30s!"  # Requires libnotify
}

listener {
    timeout = 300  # 5 minutes of inactivity
    on-timeout = pidof hyprlock || hyprlock  # Lock screen
    on-resume = hyprctl dispatch dpms on  # Wake monitors
}

listener {
    timeout = 330  # 5.5 minutes
    on-timeout = sleep 5 && hyprctl dispatch dpms off  # Turn off monitors
    on-resume = hyprctl dispatch dpms on  # Turn monitors back on
}
