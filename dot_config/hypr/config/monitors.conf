# ==================
# MONITOR CONFIG
# ==================
# monitor = eDP-2, 2560x1600@239.998993, 2560x0, 1, vrr, 1
monitorv2 {
  output = DP-2
  mode = 2560x1440@240
  position = 0x0
  scale = auto
  vrr = 0
  bitdepth = 10
  cm = hdr
  supports_wide_color = 1
  supports_hdr = 1
  sdr_min_luminance = 0.005
  sdr_max_luminance = 250
  sdrsaturation = 1.1
  sdrbrightness = 1
}

