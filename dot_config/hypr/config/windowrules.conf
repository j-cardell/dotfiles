# WINDOW RULES (Hyprland ≥ 0.53 - Updated Jan 2026)
# ===============================================

# --- Picture-in-Picture ---
windowrule = match:title (?i)^Picture[- ]in[- ]picture$, float on
windowrule = match:initial_title (?i)^Picture[- ]in[- ]picture$, float on

windowrule = match:title (?i)^Picture[- ]in[- ]picture$, size 640 360
windowrule = match:initial_title (?i)^Picture[- ]in[- ]picture$, size 640 360

# Calculated for 2560x1440 monitor: 2560-640-40 = 1880, 1440-360-20 = 1060
windowrule = match:title (?i)^Picture[- ]in[- ]picture$, move 1880 1060
windowrule = match:initial_title (?i)^Picture[- ]in[- ]picture$, move 1880 1060

windowrule = match:title (?i)^Picture[- ]in[- ]picture$, pin on
windowrule = match:initial_title (?i)^Picture[- ]in[- ]picture$, pin on

windowrule = match:title (?i)^Picture[- ]in[- ]picture$, border_size 0
windowrule = match:initial_title (?i)^Picture[- ]in[- ]picture$, border_size 0

# --- Steam Fixes ---
# 1. Tile the main Steam window
windowrule = match:class ^steam$, match:title ^Steam$, tile on

# 2. Force Steam popups/menus to float and stay focused
windowrule = match:class ^steam$, match:title ^$, float on
windowrule = match:class ^steam$, match:modal 1, float on
windowrule = match:class ^steam$, match:modal 1, stay_focused on

# Also catch it at spawn time
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, workspace current
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, float on

# --- Telegram Fixes ---
# 1. Tile the main Telegram window
windowrule = match:class ^Telegram$, match:title ^Telegram$, tile on
windowrule = match:class ^org\.telegram\.desktop$, match:title ^Telegram.*$, tile on

# 2. Force Telegram 'Save' dialogs to float and stay focused on current workspace
windowrule = match:class ^(Telegram|org\.telegram\.desktop)$, match:title ^(Save|Open|Choose|Select|File|Dialog).*$, float on
windowrule = match:class ^(Telegram|org\.telegram\.desktop)$, match:title ^(Save|Open|Choose|Select|File|Dialog).*$, stay_focused on
windowrule = match:class ^(Telegram|org\.telegram\.desktop)$, match:title ^(Save|Open|Choose|Select|File|Dialog).*$, center on
windowrule = match:class ^(Telegram|org\.telegram\.desktop)$, match:title ^(Save|Open|Choose|Select|File|Dialog).*$, workspace current
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, float on
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, stay_focused on
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, center on
windowrule = match:initial_class ^(Telegram|org\.telegram\.desktop)$, match:initial_title ^(Save|Open|Choose|Select|File|Dialog).*$, workspace current

# --- General Tiling & Layout Rules ---
windowrule = match:class ^(org\.wezfurlong\.wezterm)$, tile on
windowrule = match:class ^(org\.gnome\.), rounding 12
windowrule = match:class ^(org\.gnome\.), border_size 0
windowrule = match:class ^(gnome-control-center)$, tile on
windowrule = match:class ^(pavucontrol)$, tile on
windowrule = match:class ^(nm-connection-editor)$, tile on
windowrule = match:class ^(gnome-calculator)$, float on
windowrule = match:class ^(galculator)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(org\.gnome\.Nautilus)$, float on
windowrule = match:class ^(xdg-desktop-portal)$, float on
windowrule = match:class ^([Tt]hunar)$, float on

# --- Border Rules ---
windowrule = match:class ^(org\.wezfurlong\.wezterm|Alacritty|zen|com\.mitchellh\.ghostty|kitty|ghostty|steam)$, border_size 0

# --- Video Overrides (Apply to all applications) ---
# These are placed before the general dimming rules to ensure precedence
windowrule = match:title .*YouTube.*, opaque on
windowrule = match:title .*youtube.*, opaque on
windowrule = match:title .*YouTube.*, no_dim on
windowrule = match:title .*youtube.*, no_dim on
windowrule = match:title .*YouTube.*, opacity 1.0 1.0
windowrule = match:title .*youtube.*, opacity 1.0 1.0

windowrule = match:title .*Rumble.*, opaque on
windowrule = match:title .*rumble.*, opaque on
windowrule = match:title .*Rumble.*, no_dim on
windowrule = match:title .*rumble.*, no_dim on
windowrule = match:title .*Rumble.*, opacity 1.0 1.0
windowrule = match:title .*rumble.*, opacity 1.0 1.0

windowrule = match:title .*Twitch.*, opaque on
windowrule = match:title .*twitch.*, opaque on
windowrule = match:title .*Twitch.*, no_dim on
windowrule = match:title .*twitch.*, no_dim on
windowrule = match:title .*Twitch.*, opacity 1.0 1.0
windowrule = match:title .*twitch.*, opacity 1.0 1.0

windowrule = match:title .*Pepperbox.*, opaque on
windowrule = match:title .*pepperbox.*, opaque on
windowrule = match:title .*Pepperbox.*, no_dim on
windowrule = match:title .*pepperbox.*, no_dim on
windowrule = match:title .*Pepperbox.*, opacity 1.0 1.0
windowrule = match:title .*pepperbox.*, opacity 1.0 1.0

windowrule = match:title .*Kick.*, opaque on
windowrule = match:title .*kick.*, opaque on
windowrule = match:title .*Kick.*, no_dim on
windowrule = match:title .*kick.*, no_dim on
windowrule = match:title .*Kick.*, opacity 1.0 1.0
windowrule = match:title .*kick.*, opacity 1.0 1.0

# --- Opacity & Dimming ---
windowrule = opacity 0.99 0.99, match:float false, match:focus false

# --- Layer Rules ---
layerrule = match:namespace ^(quickshell)$, no_anim on
